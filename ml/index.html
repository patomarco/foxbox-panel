<script>
const BLOB = JSON.parse(document.getElementById('blob').textContent);
// Recuerda las contraseñas ya usadas en ESTE dominio, así al pasar de un panel a otro
// (misma clave) no la vuelve a pedir. Guarda varias por si distintos paneles usan claves distintas.
const STORE = 'fox_panel_claves';
const getClaves = () => { try { return JSON.parse(localStorage.getItem(STORE) || '[]'); } catch(e){ return []; } };
const addClave = pwd => { try { const s=getClaves().filter(x=>x!==pwd); s.unshift(pwd); localStorage.setItem(STORE, JSON.stringify(s.slice(0,6))); } catch(e){} };
function b64ToBytes(b64){ const bin=atob(b64); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
async function descifrar(pwd){
  try {
    const enc=new TextEncoder();
    const baseKey=await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64ToBytes(BLOB.salt), iterations:BLOB.iterations, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    const plainBuf=await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(BLOB.iv) }, key, b64ToBytes(BLOB.data));
    return new TextDecoder().decode(plainBuf);
  } catch(e){ return null; }
}
function abrir(html){ document.open(); document.write(html); document.close(); }
function mostrarGate(){ const g=document.getElementById('gate'); g.style.display='block'; document.getElementById('pwd').focus(); }
async function unlock(){
  const btn=document.getElementById('btn'), err=document.getElementById('err');
  const pwd=document.getElementById('pwd').value;
  if(!pwd){ err.textContent='Ingresá la contraseña.'; return; }
  btn.disabled=true; btn.textContent='Descifrando...'; err.textContent='';
  const html=await descifrar(pwd);
  if(html){ addClave(pwd); abrir(html); }
  else { err.textContent='Contraseña incorrecta.'; btn.disabled=false; btn.textContent='Abrir panel'; }
}
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
// Al cargar: probar las claves ya usadas; si alguna descifra este panel, abrir directo (sin pedir).
(async () => {
  for(const pwd of getClaves()){ const html=await descifrar(pwd); if(html){ abrir(html); return; } }
  mostrarGate();
})();
</script>
